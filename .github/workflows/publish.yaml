# Publish the `quints` CLI to PyPI on a version tag (v1.2.3).
# Trusted publishing (OIDC) — no API token. Only `quints` is published; the
# beangulp-*/beanprice-* building blocks stay in the repo.
# https://packaging.python.org/en/latest/guides/publishing-package-distribution-releases-using-github-actions-ci-cd-workflows/
name: Publish

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build quints 📦
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
      - run: uv sync --all-packages
      - name: Quality gate
        run: make check
      - name: Build the quints distribution
        run: uv build --package quints
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-to-pypi:
    name: Publish quints 🐍 to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/quints
    permissions:
      id-token: write        # trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Sign 📦 with Sigstore and create a GitHub Release
    needs: publish-to-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write        # create the release
      id-token: write        # sigstore signing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Sign the distribution with Sigstore
        uses: sigstore/gh-action-sigstore-python@v3.0.0
        with:
          inputs: >-
            ./dist/*.tar.gz
            ./dist/*.whl
      - name: Create the GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME"
          --repo "$GITHUB_REPOSITORY"
          --title "quints $GITHUB_REF_NAME"
          --notes ""
      - name: Upload the signed distribution to the Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >-
          gh release upload "$GITHUB_REF_NAME" dist/**
          --repo "$GITHUB_REPOSITORY"
