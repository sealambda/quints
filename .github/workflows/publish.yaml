# Publish all five distributions to PyPI on a version tag (v1.2.3).
# Trusted publishing (OIDC) — no API token. `quints` imports the
# beangulp-*/beanprice-* building blocks at runtime, so they must be on PyPI
# too or `uvx quints` cannot resolve.
#
# Each package publishes from its own GitHub environment (`pypi-<package>`),
# because PyPI rejects two *pending* trusted publishers with the identical
# (repo, workflow, environment) configuration — one environment shared by all
# five can only ever be registered for one project name. On PyPI, register the
# publisher for each project with environment `pypi-<package>`.
# https://packaging.python.org/en/latest/guides/publishing-package-distribution-releases-using-github-actions-ci-cd-workflows/
name: Publish

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build all distributions 📦
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
      - run: uv sync --all-packages
      - name: Quality gate
        run: make check
      - name: Build all workspace distributions
        run: uv build --all-packages
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-to-pypi:
    name: Publish ${{ matrix.package }} 🐍 to PyPI
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - quints
          - beangulp-mt940
          - beangulp-stripe
          - beangulp-wise
          - beanprice-bazg
    environment:
      name: pypi-${{ matrix.package }}
      url: https://pypi.org/p/${{ matrix.package }}
    permissions:
      id-token: write        # trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Select this package's distributions
        run: |
          mkdir package-dist
          cp dist/"$(echo '${{ matrix.package }}' | tr - _)"-* package-dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: package-dist
          # Building blocks are versioned independently of quints; a tag that
          # doesn't bump one of them re-builds an already-published version.
          skip-existing: true

  github-release:
    name: Sign 📦 with Sigstore and create a GitHub Release
    needs: publish-to-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write        # create the release
      id-token: write        # sigstore signing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Sign the distribution with Sigstore
        uses: sigstore/gh-action-sigstore-python@v3.0.0
        with:
          inputs: >-
            ./dist/*.tar.gz
            ./dist/*.whl
      - name: Create the GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME"
          --repo "$GITHUB_REPOSITORY"
          --title "quints $GITHUB_REF_NAME"
          --notes ""
      - name: Upload the signed distribution to the Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >-
          gh release upload "$GITHUB_REF_NAME" dist/**
          --repo "$GITHUB_REPOSITORY"
