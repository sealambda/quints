[project]
name = "beangulp-mt940"
version = "0.1.0"
description = "beangulp importer for SWIFT MT940 bank statements (UBS et al.): drafts transactions with stable bank references for idempotent re-imports, plus closing-balance assertions"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "GPL-2.0-only" }
keywords = ["beancount", "beangulp", "importer", "mt940", "swift", "bank-statement", "ubs"]
dependencies = [
    "beancount>=3.0",
    "beangulp>=0.2",
    "mt-940>=4.30",
]

[dependency-groups]
dev = ["pytest>=8"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/beangulp_mt940"]
