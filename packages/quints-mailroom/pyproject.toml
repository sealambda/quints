[project]
name = "quints-mailroom"
version = "0.1.0"
description = "Email gateway for AI-driven plain-text bookkeeping: watches a mailbox (Maildir or IMAP), drops attachments into the books repo's inbox/, runs a coding agent (Claude Agent SDK or any command) that drafts bookings into staging/, and replies by email"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "AGPL-3.0-only" }
keywords = [
    "beancount", "accounting", "plain-text-accounting",
    "email", "imap", "maildir", "agent", "claude",
]
dependencies = [
    "claude-agent-sdk>=0.1",
    "imap-tools>=1.7",
    "tomli>=2; python_version < '3.11'",
    "typer>=0.12",
]

[project.scripts]
quints-mailroom = "quints_mailroom.cli:main"

[dependency-groups]
dev = ["pytest>=8"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/quints_mailroom"]
