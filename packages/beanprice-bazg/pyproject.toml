[project]
name = "beanprice-bazg"
version = "0.2.1"
description = "beanprice source for official Swiss BAZG/EZV (Federal Customs) daily FX rates, quoted in CHF"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "GPL-2.0-only" }
keywords = ["beancount", "beanprice", "fx", "exchange-rates", "switzerland", "vat", "chf"]
dependencies = [
    "requests>=2.28",
]

[project.optional-dependencies]
# beanprice is a runtime peer: needed to actually plug into `bean-price`, but the
# module stays importable/testable without it (Source implements the interface
# structurally and SourcePrice is a local drop-in — never imported here).
beanprice = ["beanprice"]

[tool.deptry.per_rule_ignores]
DEP002 = ["beanprice"] # runtime peer, deliberately never imported (see above)

[dependency-groups]
dev = ["pytest>=8"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/beanprice_bazg"]
