[project]
name = "quints"
version = "0.4.0"
description = "Swiss VAT & accounting toolkit for plain-text (beancount) books: MWST reports and quarterly settlement, Bezugsteuer helpers, BAZG daily FX rates, QR-bill invoicing, KMU statutory statements, and statement importers (UBS MT940, Wise, Stripe) that draft into a staging area"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "GPL-2.0-only" }
keywords = [
    "beancount", "fava", "accounting", "plain-text-accounting",
    "switzerland", "vat", "mwst", "qr-bill", "invoice", "kmu",
]
dependencies = [
    "babel>=2.13",
    "beancount>=3.2.0",
    "beangulp-mt940>=0.1.0",
    "beangulp-stripe>=0.1.0",
    "beangulp-wise[sca]>=0.1.0",
    "beanprice-bazg>=0.2.0",
    "fava>=1.30",
    "pydantic>=2.7",
    "python-stdnum>=1.20",
    "pyyaml>=6.0.3",
    "qrbill>=1.2.0",
    "rich>=13",
    "tomli>=2; python_version < '3.11'",
    "typer>=0.12",
    "typst>=0.15.0",
]

[project.scripts]
quints = "quints.cli:main"

[dependency-groups]
dev = ["pytest>=8"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/quints"]
