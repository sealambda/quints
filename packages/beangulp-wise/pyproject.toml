[project]
name = "beangulp-wise"
version = "0.1.1"
description = "beangulp importer for Wise balance statements (statement.json), with a thin SCA-capable API client: idempotent drafts via referenceNumber, conversion-leg merging, fee splitting, closing-balance assertions"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "GPL-2.0-only" }
keywords = ["beancount", "beangulp", "importer", "wise", "transferwise", "bank-statement", "multicurrency"]
dependencies = [
    "beancount>=3.0",
    "beangulp>=0.2",
    "requests>=2.28",
]

[project.optional-dependencies]
# Only needed to sign Wise's SCA (x-2fa-approval) challenge when fetching
# statements from the API; importing statement.json files works without it.
sca = ["cryptography>=42"]

[dependency-groups]
dev = ["pytest>=8", "cryptography>=42"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/beangulp_wise"]
