[project]
name = "beangulp-stripe"
version = "0.1.0"
description = "beangulp importer for Stripe balance transactions, with a thin API client: idempotent drafts via balance-transaction ids, minor-unit conversion, fee splitting, balance-snapshot assertions"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "GPL-2.0-only" }
keywords = ["beancount", "beangulp", "importer", "stripe", "psp", "balance-transactions"]
dependencies = [
    "beancount>=3.0",
    "beangulp>=0.2",
    "requests>=2.28",
]

[dependency-groups]
dev = ["pytest>=8"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/beangulp_stripe"]
