[project]
name = "beangulp-yapeal"
version = "0.1.0"
description = "beangulp importer for Yapeal CSV bank statements: drafts transactions with stable bank references for idempotent re-imports"
readme = "README.md"
requires-python = ">=3.10"
keywords = ["beancount", "beangulp", "importer", "csv", "bank-statement", "yapeal"]
dependencies = [
    "beancount>=3.0",
    "beangulp>=0.2",
]

[dependency-groups]
dev = ["pytest>=8"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/beangulp_yapeal"]
